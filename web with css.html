<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>

    <style>
        /* Background */
        body {
            background-color: lightblue;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Heading */
        h1 {
            text-align: center;
            color: darkblue;
            text-shadow: 2px 2px 5px gray;
            margin-top: 20px;
        }

        /* Subheading */
        h2 {
            color: purple;
            text-align: center;
        }

        /* Paragraph */
        p {
            font-size: 18px;
            color: black;
            text-align: center;
            padding: 10px;
        }

        /* Box Section */
        .box {
            width: 60%;
            margin: auto;
            background-color: white;
            padding: 20px;
            border: 2px solid black;
            box-shadow: 5px 5px 10px gray;
        }

        /* Button */
        .btn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
        }

        /* Footer */
        footer {
            text-align: center;
            background-color: black;
            color: white;
            padding: 10px;
            margin-top: auto;
        }
    </style>

</head>

<body>

    <h1>Welcome to My First Website</h1>

    <div class="box">
        <h2>About Me</h2>
        <p>
            Hello! My name is Subashini. This is my first webpage created using HTML and CSS.
            I am learning web development and exploring new technologies.
        </p>

        <button class="btn">Click Me</button>
    </div>

    <footer>
        © 2026 My Website
    </footer>

</body>
</html>
